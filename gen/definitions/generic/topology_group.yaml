---
name: Topology Group
rest_endpoint: /v1/topology-group/
id_attribute: id
minimum_version: 20.15.0
test_tags: [SDWAN_2015]
doc_category: Topology Groups
attributes:
  - model_name: name
    type: String
    mandatory: true
    description: The name of the topology group
    example: TG_1
  - model_name: description
    type: String
    mandatory: true
    description: Description
    example: My topology group 1
  - model_name: solution
    type: String
    mandatory: true
    enum_values: [sdwan]
    description: Type of solution
    example: sdwan
  - model_name: profiles
    tf_name: feature_profile_ids
    type: Set
    element_type: String
    description: List of feature profile IDs
    example: f6dd22c8-0b4f-496c-9a0b-6813d1f8b8ac
    test_value: "[sdwan_policy_object_feature_profile.test.id]"

test_prerequisites: |
  resource "sdwan_policy_object_feature_profile" "test" {
    name        = "POLICY_OBJECT_TF"
    description = "Terraform test"
  }
